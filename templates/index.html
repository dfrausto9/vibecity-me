<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCity.me | Find Your Energy</title>
    <style>
        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white; transition: background 1.5s ease-in-out;
            overflow-y: auto; padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px; padding: 40px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 95%; max-width: 450px;
        }

        h1 { margin-top: 0; letter-spacing: -1px; color: #f6ad55; }
        .hint { font-size: 0.8rem; color: #a0aec0; margin-bottom: 8px; text-align: left; }
        
        input[type="text"] {
            width: 100%; padding: 14px; border-radius: 12px; background: rgba(0, 0, 0, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.2); color: white; margin-bottom: 10px; box-sizing: border-box; outline: none;
        }

        .btn-main { background: #ed8936; border: none; width: 100%; font-size: 1rem; color: white; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* TOGGLE SWITCH CSS */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-toggle { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider-toggle:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider-toggle { background-color: #f6ad55; }
        input:checked + .slider-toggle:before { transform: translateX(20px); }

        #results { margin-top: 25px; padding: 15px; border-radius: 15px; background: rgba(0,0,0,0.2); text-align: left; min-height: 50px; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.05); }
        .credit-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>VibeCity.me</h1>
        <p id="vibe-label" style="color: #a0aec0;">Extracting local energy...</p>

        <div style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 15px; margin-bottom: 20px;">
            <span style="font-size: 0.7rem; color: #718096;">BALANCE: </span>
            <span id="balance-amt" style="font-weight: bold; color: #f6ad55;">$0.00</span>
        </div>

        <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
            <div class="hint">Where do you want to go?</div>
            <input type="text" id="city-input" placeholder="Enter city (e.g. San Bernardino)">
            
            <div style="display: flex; justify-content: center; align-items: center; gap: 10px; margin: 15px 0;">
                <span style="font-size: 0.8rem; color: #a0aec0;">General Vibes</span>
                <label class="switch">
                    <input type="checkbox" id="hot-springs-toggle">
                    <span class="slider-toggle"></span>
                </label>
                <span style="font-size: 0.8rem; color: #f6ad55; font-weight: bold;">Hot Springs Only ♨️</span>
            </div>

            <button id="scrape-btn" onclick="runScrape()" class="btn-main">Extract Vibes (-$0.10)</button>
        </div>

        <div id="results">
            <p style="text-align: center; color: #718096;">Your discovery results will appear here.</p>
        </div>

        <div style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
            <div class="hint" style="text-align: center;">Add Credits:</div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="credit-btn" onclick="buyCredits(1)">$1</button>
                <button class="credit-btn" onclick="buyCredits(5)">$5</button>
                <button class="credit-btn" onclick="buyCredits(10)">$10</button>
            </div>
        </div>
    </div>

    <script>
        let userKey = localStorage.getItem('vibecity_api_key');

        async function initApp() {
            if (!userKey) {
                const res = await fetch('/generate_key', { method: 'POST' });
                const data = await res.json();
                userKey = data.api_key;
                localStorage.setItem('vibecity_api_key', userKey);
            }
            fetchBalance();
        }

        async function fetchBalance() {
            const res = await fetch(`/check_balance?key=${userKey}`);
            const data = await res.json();
            document.getElementById('balance-amt').innerText = `$${parseFloat(data.balance).toFixed(2)}`;
        }

        async function runScrape() {
            const city = document.getElementById('city-input').value.trim();
            const isHotSprings = document.getElementById('hot-springs-toggle').checked;
            const btn = document.getElementById('scrape-btn');
            
            if (!city) return alert("Please enter a city!");

            btn.disabled = true;
            btn.innerText = "Tuning Engine... 🪐";

            try {
                const res = await fetch('/scrape', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        url: city, 
                        api_key: userKey,
                        hot_springs: isHotSprings 
                    })
                });
                const data = await res.json();
                
                if (data.error) {
                    alert(data.error);
                } else {
                    const recs = data.result.recommendations;
                    let html = `<h3 style="margin-top:0; color:#f6ad55;">${data.result.location}</h3><ul>`;
                    recs.forEach(r => html += `<li>${r}</li>`);
                    html += `</ul><p style="font-size:0.7rem; color:#718096;">Source: ${data.result.source_url}</p>`;
                    document.getElementById('results').innerHTML = html;
                    fetchBalance();
                }
            } catch (e) {
                alert("Connection error.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Extract Vibes (-$0.10)";
            }
        }

        async function buyCredits(amount) {
            const res = await fetch('/create_checkout', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ amount: amount, api_key: userKey })
            });
            const data = await res.json();
            if (data.url) window.location.href = data.url;
        }

        initApp();
    </script>
</body>
</html>
