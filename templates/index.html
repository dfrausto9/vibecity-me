<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCity.me | Find Your Energy</title>
    <style>
        /* 1. LAYOUT & BACKGROUND */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            transition: background 1.5s ease-in-out;
            overflow: hidden;
        }

        /* 2. GLASS CARD EFFECT */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 420px;
        }

        h1 { margin-top: 0; letter-spacing: -1px; }

        /* 3. THE SLIDER STYLING */
        .slider-container { margin: 30px 0; }

        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255,255,255,0.6);
            transition: transform 0.2s;
        }

        .slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

        /* 4. BUTTONS & UI */
        .button-group { margin-bottom: 20px; }

        button {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 18px;
            border-radius: 15px;
            margin: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        button:hover {
            background: white;
            color: black;
            transform: translateY(-2px);
        }

        #results {
            margin-top: 25px;
            padding: 15px;
            border-radius: 15px;
            background: rgba(0,0,0,0.2);
            min-height: 50px;
        }

        .pivot-highlight {
            color: #fde68a;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>VibeCity.me</h1>
        <p id="vibe-label">Tuning your energy...</p>

        <div class="button-group">
            <button onclick="checkVibe('paris')">🍷 Paris</button>
            <button onclick="checkVibe('tulum')">🌴 Tulum</button>
            <button onclick="checkVibe('sd')">☀️ San Diego</button>
        </div>

        <div class="slider-container">
            <input type="range" min="1" max="100" value="1" class="slider" id="vibeSlider">
        </div>

        <div id="results">
            <p>Slide to explore San Diego...</p>
        </div>
    </div>

    <script>
        const slider = document.getElementById('vibeSlider');
        const label = document.getElementById('vibe-label');
        const results = document.getElementById('results');
        const body = document.body;

        // 1. SLIDER LOGIC (Local San Diego Vibes)
        slider.oninput = function() {
            let val = this.value;
            
            if (val < 33) {
                label.innerHTML = "Vibe: Deep Chill (Sunset Cliffs)";
                body.style.background = "linear-gradient(135deg, #2dd4bf, #fde68a)"; 
                results.innerHTML = "<p>Perfect time for tide pools or a meditation session.</p>";
            } else if (val < 66) {
                label.innerHTML = "Vibe: The Local Scene (North Park)";
                body.style.background = "linear-gradient(135deg, #fbbf24, #ef4444)";
                results.innerHTML = "<p>Grab a craft brew and check out some street art.</p>";
            } else {
                label.innerHTML = "Vibe: Electric Night (Gaslamp)";
                body.style.background = "linear-gradient(135deg, #7c3aed, #db2777)";
                results.innerHTML = "<p>The energy is high. Ready for rooftop cocktails?</p>";
            }
        };

        // 2. THE VIBE MATCHER (Steering away from saturated spots)
        function checkVibe(city) {
            if (city === 'paris') {
                body.style.background = "linear-gradient(135deg, #475569, #1e293b)";
                results.innerHTML = `
                    <p>Paris is a classic, but it's crowded today.</p>
                    <p class="pivot-highlight">Try Marseille instead?</p>
                    <button style="font-size: 0.8rem;">Unlock Hidden Gem (1 Credit)</button>
                `;
            } else if (city === 'tulum') {
                body.style.background = "linear-gradient(135deg, #134e4a, #064e3b)";
                results.innerHTML = `
                    <p>Tulum is seeing high traffic.</p>
                    <p class="pivot-highlight">Check out Holbox for true peace?</p>
                    <button style="font-size: 0.8rem;">Unlock Hidden Gem (1 Credit)</button>
                `;
            } else {
                label.innerHTML = "Vibe: Home Base (San Diego)";
                body.style.background = "linear-gradient(135deg, #fbbf24, #ef4444)";
                results.innerHTML = "<p>Welcome back! Use the slider to find your SD energy.</p>";
            }
        }
    </script>
</body>
</html>
