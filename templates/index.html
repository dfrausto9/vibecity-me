<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeCity.me | Find Your Energy</title>
    <style> .slider {
    -webkit-appearance: none;
    width: 100%;
    height: 10px;
    border-radius: 5px;
    background: rgba(255, 255, 255, 0.3);
    outline: none;
    margin: 20px 0;
}

.slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 25px;
    height: 25px;
    border-radius: 50%;
    background: white;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(255,255,255,0.8);
}
        /* The dynamic background */
        body {
           <div class="glass-card">
    <h1>VibeCity.me</h1>
    <p id="vibe-label">Current Vibe: Chill</p>
    
    <input type="range" min="1" max="100" value="1" class="slider" id="vibeSlider">

    <div id="results" style="margin-top: 20px;">
        <p>Explore San Diego...</p>
    </div>
</div>

<script>
    const slider = document.getElementById('vibeSlider');
    const label = document.getElementById('vibe-label');
    const body = document.body;

    slider.oninput = function() {
        let val = this.value;
        
        if (val < 33) {
            label.innerHTML = "Vibe: Deep Chill (Sunset Cliffs)";
            body.style.background = "linear-gradient(135deg, #2dd4bf, #fde68a)"; // Teal & Gold
        } else if (val < 66) {
            label.innerHTML = "Vibe: The Local Scene (North Park)";
            body.style.background = "linear-gradient(135deg, #fbbf24, #ef4444)"; // Orange & Red
        } else {
            label.innerHTML = "Vibe: Electric Night (Gaslamp)";
            body.style.background = "linear-gradient(135deg, #7c3aed, #db2777)"; // Purple & Pink
        }
    };
</script>
        }

        /* The Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
        }

        button {
            background: white;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            margin: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>VibeCity.me</h1>
        <p>I'm feeling...</p>
        
        <button onclick="changeVibe('tulum')">🌴 Tulum</button>
        <button onclick="changeVibe('paris')">🍷 Paris</button>
        <button onclick="changeVibe('tokyo')">🗼 Tokyo</button>
        <button onclick="changeVibe('sd')">☀️ San Diego</button>

        <div id="results" style="margin-top: 20px;">
            </div>
    </div>

    <script>
        function changeVibe(vibe) {
            const body = document.body;
            if (vibe === 'tulum') body.style.background = "linear-gradient(135deg, #2dd4bf, #fde68a)";
            if (vibe === 'paris') body.style.background = "linear-gradient(135deg, #7c3aed, #db2777)";
            if (vibe === 'tokyo') body.style.background = "linear-gradient(135deg, #06b6d4, #4ade80)";
            if (vibe === 'sd')    body.style.background = "linear-gradient(135deg, #fbbf24, #ef4444)";
        }
    </script>
</body>
</html>
